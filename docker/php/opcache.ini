; =============================================================================
; QHSSE App — OPcache tuning
; =============================================================================
opcache.enable            = 1
opcache.enable_cli        = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000
opcache.revalidate_freq   = 0       ; 0 = always revalidate (dev); set ke 60 di prod
opcache.validate_timestamps = 1     ; set ke 0 di prod untuk performa maksimal
opcache.save_comments     = 1
opcache.fast_shutdown     = 1
