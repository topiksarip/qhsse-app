; =============================================================================
; QHSSE App — PHP runtime overrides
; =============================================================================

; Upload
upload_max_filesize = 50M
post_max_size       = 55M

; Memory & time
memory_limit        = 256M
max_execution_time  = 120
max_input_time      = 120

; Error display (override per APP_ENV di entrypoint kalau perlu)
display_errors = Off
log_errors     = On
error_log      = /var/log/php/error.log

; Timezone
date.timezone = Asia/Jakarta

; Session
session.gc_maxlifetime = 7200

; Misc
realpath_cache_size = 4096K
realpath_cache_ttl  = 600
