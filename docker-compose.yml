# =============================================================================
# QHSSE App — Docker Compose
# Services: app (PHP-FPM) · nginx · postgres · redis · queue
#
# Quick start:
#   cp .env.docker .env
#   docker compose up -d
#   docker compose exec app php artisan migrate --seed
# =============================================================================

services:

  # ── PHP-FPM Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
    container_name: qhsse_app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
    env_file: .env
    volumes:
      # Source code live-mount (dev hot-reload tanpa rebuild image)
      - .:/var/www/html
      # Jaga build hasil node stage (jangan di-overwrite mount)
      - /var/www/html/public/build
      # Storage persistent
      - qhsse_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qhsse_net

  # ── Nginx Web Server ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: qhsse_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - /var/www/html/public/build    # sama seperti app agar nginx bisa serve build
      - qhsse_storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - qhsse_net

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qhsse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-qhsse}
      POSTGRES_USER: ${DB_USERNAME:-qhsse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - qhsse_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_EXPOSE:-5432}:5432"   # expose ke host untuk debugging (DBeaver/TablePlus)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-qhsse} -d ${DB_DATABASE:-qhsse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - qhsse_net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qhsse_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - qhsse_redis:/data
    ports:
      - "${REDIS_PORT_EXPOSE:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - qhsse_net

  # ── Queue Worker ───────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
    container_name: qhsse_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    volumes:
      - .:/var/www/html
      - /var/www/html/public/build
      - qhsse_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qhsse_net

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  qhsse_pgdata:
    driver: local
  qhsse_redis:
    driver: local
  qhsse_storage:
    driver: local

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  qhsse_net:
    driver: bridge
