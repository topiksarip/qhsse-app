name: QHSSE CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: PHP Tests + Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_sqlite, mbstring, xml, ctype, json, bcmath, tokenizer, fileinfo
          coverage: none

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets (harus sebelum test agar Vite manifest tersedia)
        run: npm run build

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHP Tests (SQLite in-memory)
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          DB_URL: ""
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          BROADCAST_CONNECTION: "null"
          MAIL_MAILER: array
        run: php artisan test --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-assets
          path: public/build/
          retention-days: 7
